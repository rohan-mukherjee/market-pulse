<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Market Pulse — Daily market intelligence and investment research for Indian markets.">
  <meta name="theme-color" content="#0a0f1a">
  <title>Market Pulse — Daily Market Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

  <!-- Site Header -->
  <header class="site-header">
    <div class="container">
      <div class="site-brand">
        <span class="site-title">Market Pulse</span>
        <span class="site-tagline">Daily Market Intelligence</span>
      </div>
      <nav class="site-nav">
        <a href="index.html" class="nav-link active">Latest</a>
        <a href="archive.html" class="nav-link">Archive</a>
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <main id="report-root">

    <!-- Loading State -->
    <div id="loading-state" class="state-container">
      <div class="loader"></div>
      <p>Loading report...</p>
    </div>

    <!-- Error State -->
    <div id="error-state" class="state-container hidden">
      <p class="error-message"></p>
      <a href="index.html" class="btn">Load Latest Report</a>
    </div>

    <!-- Report Content -->
    <div id="report-content" class="hidden">

      <!-- Hero -->
      <section id="report-hero" class="hero-section"></section>

      <!-- Report Navigation -->
      <div id="report-nav" class="report-nav"></div>

      <!-- Tab Navigation -->
      <div class="container">
        <nav id="tab-nav" class="tab-nav">
          <button class="tab-btn active" data-tab="overview">Overview</button>
          <button class="tab-btn" data-tab="markets">Markets</button>
          <button class="tab-btn" data-tab="ideas">Ideas</button>
          <button class="tab-btn" data-tab="plan">Plan</button>
        </nav>
      </div>

      <!-- Tab Panels -->
      <div class="container">
        <div id="tab-overview" class="tab-panel active"></div>
        <div id="tab-markets" class="tab-panel hidden"></div>
        <div id="tab-ideas" class="tab-panel hidden"></div>
        <div id="tab-plan" class="tab-panel hidden"></div>
      </div>

      <!-- Sources & Disclaimer -->
      <div class="container">
        <section id="report-sources" class="sources-section"></section>
        <section id="report-disclaimer" class="disclaimer-section"></section>
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Market Pulse. For educational purposes only.</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="assets/js/config.js"></script>
  <script src="assets/js/renderer.js"></script>
  <script src="assets/js/app.js"></script>

</body>
</html>
